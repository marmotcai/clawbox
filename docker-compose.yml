# ClawBox — 教育 AI 服务器
# docker-compose.yml — 核心服务编排

services:
  # ========== proxyclaw 核心 ==========
  proxyclaw:
    image: ${PROXYCLAW_IMAGE:-proxyclaw:latest}
    container_name: clawbox-proxyclaw
    restart: unless-stopped
    ports:
      - "${PROXYCLAW_PORT:-20060}:20060"
    environment:
      # 基础配置
      - LLM_PROXY_EDITION=team
      - LLM_PROXY_SERVER_PORT=20060
      - LLM_PROXY_SERVER_HOST=0.0.0.0
      # 数据库 (PostgreSQL + pgvector)
      - LLM_PROXY_DB_DRIVER=postgresql
      - PG_HOST=clawbox-postgresql
      - PG_PORT=5432
      - PG_USER=postgres
      - PG_PASSWORD=${PG_PASSWORD}
      - PG_DATABASE=proxyclaw
      - PG_SSL_MODE=disable
      - PG_SSLMODE=disable
      # 管理员
      - LLM_PROXY_ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - LLM_PROXY_ADMIN_PASSWORD=${ADMIN_PASSWORD}
      # Ollama (embedding) — 可选，通过 OLLAMA_ENABLED 控制
      - OLLAMA_ENABLED=${OLLAMA_ENABLED:-false}
      - OLLAMA_HOST=http://clawbox-ollama:11434
      - OLLAMA_BASE_URL=http://clawbox-ollama:11434
      - EMBEDDING_BACKEND=${EMBEDDING_BACKEND:-none}
      - EMBEDDING_MODEL=bge-m3
      # 日志
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LLM_PROXY_LOG_PATH=/app/logs
      - LLM_PROXY_LOG_OUTPUT=both
      - LLM_PROXY_LOG_FORMAT=console
      # 时区
      - TZ=Asia/Shanghai
    volumes:
      - proxyclaw_data:/app/storage
      - proxyclaw_logs:/app/logs
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - clawbox-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:20060/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ========== PostgreSQL + pgvector ==========
  postgresql:
    image: pgvector/pgvector:pg16
    container_name: clawbox-postgresql
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${PG_PASSWORD}
      - POSTGRES_DB=proxyclaw
      - TZ=Asia/Shanghai
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - clawbox-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ========== Ollama (Embedding，可选) ==========
  # 默认不启动，需要本地 embedding 时启用：
  #   docker compose --profile embedding up -d
  # 或在 .env 中设置 OLLAMA_ENABLED=true 并使用 --profile embedding
  ollama:
    image: ollama/ollama:latest
    container_name: clawbox-ollama
    restart: unless-stopped
    profiles:
      - embedding
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - clawbox-net

  # ========== OTA Agent (本地构建，生产部署使用) ==========
  ota-agent:
    build:
      context: ./ota
      dockerfile: Dockerfile
    container_name: clawbox-ota
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ota_data:/opt/ota
    environment:
      - DEVICE_ID=${DEVICE_ID}
      - OTA_SERVER=${OTA_SERVER:-https://ota.clawbox.ai}
      - CURRENT_VERSION=${CLAWBOX_VERSION:-1.0.0}
      - COMPOSE_DIR=/opt/clawbox
    networks:
      - clawbox-net

volumes:
  proxyclaw_data:
  proxyclaw_logs:
  pg_data:
  ollama_data:
  ota_data:

networks:
  clawbox-net:
    driver: bridge
